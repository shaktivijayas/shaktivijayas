name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: shaktivijayas
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00D4FF&color_dots=ebedf0,c0f0ff,80d4ff,00aaff,007acc
            dist/github-contribution-grid-snake-dark.svg?color_snake=7c3aed&color_dots=161b22,2d1b4e,4a2d8e,6644cc,7c3aed&color_empty=161b22

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
